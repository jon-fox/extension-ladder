---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: extension-ladder-ingress
spec:
  rules:
  - host: "{{ .Values.ingress.HOST }}"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: extension-ladder-service
            port:
              number: {{ .Values.ingress.PORT }}
